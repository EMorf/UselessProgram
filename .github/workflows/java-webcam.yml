name: Java CI with Gradle and Webcam Capture

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Smoke Test (Linux)
        if: runner.os == 'Linux'
        run: |
          xvfb-run --auto-servernum java -jar build/libs/*.jar & P=$!
          sleep 10
          if ! kill -0 $P 2>/dev/null; then
            echo "Application crashed prematurely"
            exit 1
          fi
          kill -9 $P 2>/dev/null || true

      - name: Smoke Test (Windows/macOS)
        if: runner.os != 'Linux'
        shell: bash
        run: |
          java -jar build/libs/*.jar & P=$!
          sleep 10
          if ! kill -0 $P 2>/dev/null; then
             echo "Application crashed prematurely"
             exit 1
          fi
          kill -9 $P 2>/dev/null || true

  release:
    needs: check
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Bump patch version in build.gradle
        id: bump_version
        shell: bash
        run: |
          VERSION_LINE=$(grep '^version' build.gradle)
          VERSION=$(echo "$VERSION_LINE" | sed -E "s/.*['\"]([0-9]+\.[0-9]+\.[0-9]+)['\"].*/\1/")
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          sed -i.bak "s/version = '[0-9]*\.[0-9]*\.[0-9]*'/version = '$NEW_VERSION'/" build.gradle
          rm build.gradle.bak
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          git add build.gradle
          git commit -m "[skip ci] Bump version to $NEW_VERSION" || echo "No changes to commit"

      - name: Build with Gradle
        run: |
          ./gradlew build --no-daemon
          ./gradlew createExe --no-daemon

      - name: Push Version Update
        run: |
          git push origin HEAD:${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          name: Release v${{ steps.bump_version.outputs.new_version }}
          files: |
            build/libs/*.jar
            build/launch4j/UselessProgram.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
