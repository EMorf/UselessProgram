plugins {
    id 'java'
    id 'edu.sc.seis.launch4j' version '3.0.6'
}

group = 'com.example'
version = '1.0.7'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.bytedeco:javacv:1.5.12'
    implementation 'org.bytedeco:javacv-platform:1.5.12'
    testImplementation 'junit:junit:4.13.2'
}

test {
    useJUnitPlatform()
}

jar {
    manifest {
        attributes 'Main-Class': 'Main'
    }
}

launch4j {
    mainClassName = 'Main'
    headerType = 'gui'
    outfile = 'UselessProgram.exe'
    jreMinVersion = '17'
    initialHeapSize = 128
    maxHeapSize = 1024
}
